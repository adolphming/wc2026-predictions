// ===== 预测引擎 =====
const 阶 = n=>n<=1?1:n*阶(n-1);
const 泊 = (l,k)=>Math.exp(-l)*Math.pow(l,k)/阶(k);



// 综合预测: 全场+半场+BTTS+双选+零封
function 预测(主,客){
  const ht=T[主],at=T[客];
  if(!ht||!at)return{
    h:33,d:34,a:33,sc:'1-1',l:1.2,m:1.1,tg:2.3,tg_int:2,
    h_h:33,h_d:34,h_a:33,h_sc:'0-0',btts:50,cs_h:40,cs_a:40,
    dc_1x:67,dc_12:66,dc_x2:67
  };
  let l=ht.att*at.def*1.15,m=at.att*ht.def*1.15;
  l*=ht.st*ht.cup*ht.mk;m*=at.st*at.cup*at.mk;
  if(东.includes(主)){l*=1.20;m*=0.90}
  if(东.includes(客)){m*=1.15;l*=0.92}
  const seed=(主.charCodeAt(0)+客.charCodeAt(0)+主.length+客.length)%7;
  const jit=1+(seed-3)*0.015;l*=jit;m*=(2.02-jit);
  l=Math.min(Math.max(l,0.3),5.0);m=Math.min(Math.max(m,0.2),4.0);
  const hl=Math.max(l*0.42,0.15),hm=Math.max(m*0.42,0.10);
  let hW=0,dr=0,aW=0,mp=0,bs='1-1',bttsP=0,csH=0,csA=0;
  for(let hg=0;hg<=7;hg++)for(let ag=0;ag<=7;ag++){
    const p=泊(l,hg)*泊(m,ag);
    if(hg>ag)hW+=p;else if(hg===ag)dr+=p;else aW+=p;
    if(p>mp){mp=p;bs=hg+'-'+ag;}
    if(hg>0&&ag>0)bttsP+=p;
    if(ag===0)csH+=p;if(hg===0)csA+=p;
  }
  const tot=hW+dr+aW;
  let hhW=0,hdr=0,haW=0,hmp=0,hbs='0-0';
  for(let hg=0;hg<=4;hg++)for(let ag=0;ag<=4;ag++){
    const p=泊(hl,hg)*泊(hm,ag);
    if(hg>ag)hhW+=p;else if(hg===ag)hdr+=p;else haW+=p;
    if(p>hmp){hmp=p;hbs=hg+'-'+ag;}
  }
  const htot=hhW+hdr+haW;
  const tgInt=parseInt(bs.split("-")[0])+parseInt(bs.split("-")[1]);
  return{
    h:Math.round(hW/tot*1000)/10,d:Math.round(dr/tot*1000)/10,a:Math.round(aW/tot*1000)/10,
    sc:bs,l:Math.round(l*10)/10,m:Math.round(m*10)/10,tg:Math.round((l+m)*10)/10,tg_int:tgInt,
    h_h:Math.round(hhW/htot*1000)/10,h_d:Math.round(hdr/htot*1000)/10,h_a:Math.round(haW/htot*1000)/10,h_sc:hbs,
    btts:Math.round(bttsP/tot*1000)/10,cs_h:Math.round(csH/tot*1000)/10,cs_a:Math.round(csA/tot*1000)/10,
    dc_1x:Math.round((hW+dr)/tot*1000)/10,dc_12:Math.round((hW+aW)/tot*1000)/10,dc_x2:Math.round((dr+aW)/tot*1000)/10
  };
}

function 积分(g){
  const ts={};g.t.forEach(n=>{ts[n]={n,pt:0,gf:0,ga:0,gd:0,w:0,d:0,l:0,p:0};});
  g.m.forEach(m=>{
    if(!m.s)return;
    const [hs,as]=m.s.split('-').map(Number);
    const h=ts[m.h],a=ts[m.a];if(!h||!a)return;
    h.p++;a.p++;h.gf+=hs;h.ga+=as;h.gd=h.gf-h.ga;
    a.gf+=as;a.ga+=hs;a.gd=a.gf-a.ga;
    if(hs>as){h.pt+=3;h.w++;a.l++}
    else if(hs===as){h.pt+=1;a.pt+=1;h.d++;a.d++}
    else{a.pt+=3;a.w++;ht.l++}
  });
  return Object.values(ts).sort((a,b)=>b.pt-a.pt||b.gd-a.gd);
}

function 全赛(){const a=[];组.split('').forEach(l=>{G[l].m.forEach(m=>{a.push({...m,g:l});});});return a.sort((a,b)=>a.d.localeCompare(b.d)||a.t.localeCompare(b.t));}

    else if(aW>62)reason=`${m.a}实力明显强于${m.h}${awayStar?'，'+awayStar+'是取胜关键':''}。推荐${m.a}胜，预测${p.sc}`;

    else if(aW>52&&drP<25)reason=`${m.a}${['账面实力占优','近期状态更好','进攻效率更高'][sd2]}，${m.h}主场难阻${m.a}。推荐${m.a}胜`;
    else if(drP>22){
      const drTxt=['两队实力旗鼓相当，谁赢都正常。','攻防数据不分伯仲，看临场发挥。','这场硬碰硬不好说，双方都有机会。','纸面实力五五开，主场是唯一变量。'];
      const endTxt=['稳妥起见双选不败','建议防一手平局','任何结果都不意外'];
      reason=drTxt[sd2]+' '+endTxt[(sd2+1)%3];
    }
    else if(hW>aW)reason=`${m.h}稍占上风，但${m.a}有爆冷能力。推荐${m.h}不败`;
    else reason=`${m.a}稍占优势，不过${m.h}主场加持不容小觑。推荐${m.a}不败`;
html+=`<div class="bc"><h4>${旗[m.h]||''} ${m.h} vs ${m.a} ${旗[m.a]||''}</h4>
      <div style="font-size:12px;color:var(--text3)">${m.t} · ${m.v} · ${m.g}组</div>
      <div class="bs">${p.sc} · 总进球 ${tg_int}球</div>
      <div class="tr">
        <div class="tb2"><div class="fl g" style="width:${p.h}%"></div><span style="font-size:9px;position:absolute;top:5px;left:4px;color:var(--text3)">${m.h}</span></div>
        <div class="tb2"><div class="fl y" style="width:${p.d}%"></div><span style="font-size:9px;position:absolute;top:5px;left:4px;color:var(--text3)">平</span></div>
        <div class="tb2"><div class="fl r" style="width:${p.a}%"></div><span style="font-size:9px;position:absolute;top:5px;left:4px;color:var(--text3)">${m.a}</span></div>
      </div>
      <div class="rs">${recs.map(r=>`<span class="r ${r.c}">${r.t}</span>`).join('')}</div>
      <div class="ts"><span>⚔ ${m.h} 攻${ht.att.toFixed(1)}/防${ht.def.toFixed(1)}</span><span>⚔ ${m.a} 攻${at.att.toFixed(1)}/防${at.def.toFixed(1)}</span>${ht.star?`<span>⭐ ${ht.star}</span>`:''}${at.star?`<span>⭐ ${at.star}</span>`:''}</div>
      <div class="ts"><span>🔄 双主不败 ${p.dc_1x}%</span><span>🔄 双客不败 ${p.dc_x2}%</span><span>⚔ 都进球 ${p.btts}%</span><span>🛡 ${m.h}零封 ${p.cs_h}%</span></div>
      <div class="ts"><span>⏱ 半场 ${p.h_sc}</span><span>半主${p.h_h}%</span><span>半平${p.h_d}%</span><span>半客${p.h_a}%</span></div><div class="rc">📊 分析: ${reason}</div>
      <div class="bt">赔率: ${(抽*100/p.h).toFixed(2)} / ${(抽*100/p.d).toFixed(2)} / ${(抽*100/p.a).toFixed(2)}</div>
    </div>`;
    const idx=all.indexOf(m);const next=all[idx+1];
    if(!next||next.d!==m.d)html+='</div>';
  });
  c.innerHTML=html;
}

      <div style="margin-bottom:6px"><div style="display:flex;gap:6px;height:22px">

        <div style="flex:${p.d};background:var(--yellow);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;min-width:22px">${p.d}%</div>
        <div style="flex:${p.a};background:var(--red);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;min-width:28px">${p.a}%</div>

    </div></div>`;
  });
  c.innerHTML=html;
}

function r淘(){
  const c=document.getElementById('brc');const gr={};
  组.split('').forEach(l=>{const st=积分(G[l]);
    if(st.length>=4&&st.some(t=>t.p>0)){gr[l]={w:st[0].n,r:st[1].n};}else{const s=[...G[l].t].sort((a,b)=>(T[b]?.att||0)-(T[a]?.att||0));gr[l]={w:s[0],r:s[1]};}});
  function dn(s){const g=s.match(/([A-L])组/);if(!g)return s;if(s.includes('第1'))return(旗[gr[g[1]]?.w]||'')+' '+gr[g[1]]?.w;if(s.includes('第2'))return(旗[gr[g[1]]?.r]||'')+' '+gr[g[1]]?.r;return s;}
  const r32=['A组第2 vs B组第2','E组第1 vs 第3','F组第1 vs C组第2','C组第1 vs F组第2','I组第1 vs 第3','E组第2 vs I组第2','A组第1 vs 第3','L组第1 vs 第3','D组第1 vs 第3','G组第1 vs 第3','K组第2 vs L组第2','H组第1 vs J组第2','B组第1 vs 第3','J组第1 vs H组第2','K组第1 vs 第3','D组第2 vs G组第2'];
  let h='<div class="brr"><div class="brl">32强<br><small>6.28-7.3</small></div>';
  r32.forEach(m=>{const p=m.split(' vs ');h+=`<div class="brg"><div class="bt2">${dn(p[0])}</div><div class="bt2 lo">${dn(p[1])}</div></div>`;});
  h+='</div><div class="brr"><div class="brl">16强<br><small>7.4-7.7</small></div>';
  for(let i=0;i<8;i++)h+=`<div class="brg"><div class="bt2" style="padding:6px 0;text-align:center;color:var(--text3);font-size:10px">待定</div></div>`;
  h+='</div><div class="brr"><div class="brl">8强<br><small>7.9-7.11</small></div>';
  for(let i=0;i<4;i++)h+=`<div class="brg"><div class="bt2" style="padding:10px 0;text-align:center;color:var(--text3)">待定</div></div>`;
  h+='</div><div class="brr"><div class="brl">4强<br><small>7.14-7.15</small></div>';
  for(let i=0;i<2;i++)h+=`<div class="brg"><div class="bt2" style="padding:12px 0;text-align:center;color:var(--text3)">待定</div></div>`;
  h+='</div><div class="brr"><div class="brl">决赛<br><small>7.19</small></div>';
  h+=`<div class="brg"><div class="bt2" style="padding:14px 0;text-align:center;font-weight:700;font-size:13px;background:var(--gold);color:#000;border-radius:6px">🏆 冠军待定</div></div></div>`;
  c.innerHTML=h;
}

function st(tab){
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('act'));document.querySelectorAll('nav a').forEach(a=>a.classList.remove('act'));
  const el=document.getElementById('tab-'+tab);if(el)el.classList.add('act');
  document.querySelectorAll('nav a').forEach(a=>{const map={bets:'下注',groups:'赛程',predictions:'预测',bracket:'淘汰'};if(a.textContent.includes(map[tab]||''))a.classList.add('act');});
}
r();
