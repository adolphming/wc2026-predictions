.group-table .pos-1,.pos-2{color:var(--green)}

.match-card:last-child{border-bottom:none}
.match-card:hover{background:var(--bg3)}
.match-team{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500}
.match-team:last-child{text-align:right;flex-direction:row-reverse}
.match-score{text-align:center;font-weight:700;font-size:16px;font-family:'Inter',sans-serif;min-width:50px}

// ===== 预测引擎 =====
const 阶 = n=>n<=1?1:n*阶(n-1);
const 泊 = (l,k)=>Math.exp(-l)*Math.pow(l,k)/阶(k);

function 预测(主,客){
  const ht=T[主],at=T[客];
  if(!ht||!at)return{h:33,d:34,a:33,sc:'1-1',l:1.2,m:1.1,tg:2.3};
  
  // 基础预期进球 = attack * opponent_defense * base
  let l = ht.att * at.def * 0.92;
  let m = at.att * ht.def * 0.92;
  
  // 多维修正
  l *= ht.st * ht.cup * ht.mk;
  m *= at.st * at.cup * at.mk;
  
  // 东道主效应
  if(东.includes(主)){l*=1.28;m*=0.88}
  if(东.includes(客)){m*=1.22;l*=0.90}
  
  // 加随机扰动(模拟真实比赛的不确定性)
  const seed = (主.charCodeAt(0)+客.charCodeAt(0)+主.length+客.length)%7;
  const jitter = 1 + (seed-3)*0.04;
  l *= jitter; m *= (2-jitter);
  
  // 限制极端值
  l = Math.min(Math.max(l,0.3),5.0);
  m = Math.min(Math.max(m,0.2),4.0);
  
  // 计算概率(允许最多7球)
  let hW=0,dr=0,aW=0,mp=0,bs='1-1';
  for(let hg=0;hg<=7;hg++)for(let ag=0;ag<=7;ag++){
    const p=泊(l,hg)*泊(m,ag);
    if(hg>ag)hW+=p;else if(hg===ag)dr+=p;else aW+=p;
    if(p>mp){mp=p;bs=hg+'-'+ag;}
  }
  const tot=hW+dr+aW;
  return{
    h:Math.round(hW/tot*1000)/10,d:Math.round(dr/tot*1000)/10,a:Math.round(aW/tot*1000)/10,
    sc:bs,l:Math.round(l*10)/10,m:Math.round(m*10)/10,tg:Math.round((l+m)*10)/10
  };
}

function 积分(g){
  const ts={};g.t.forEach(n=>{ts[n]={n,pt:0,gf:0,ga:0,gd:0,w:0,d:0,l:0,p:0};});
  g.m.forEach(m=>{
    if(!m.s)return;
    const [hs,as]=m.s.split('-').map(Number);
    const h=ts[m.h],a=ts[m.a];
    if(!h||!a)return;
    h.p++;a.p++;h.gf+=hs;h.ga+=as;h.gd=h.gf-h.ga;
    a.gf+=as;a.ga+=hs;a.gd=a.gf-a.ga;
    if(hs>as){h.pt+=3;h.w++;a.l++}
    else if(hs===as){h.pt+=1;a.pt+=1;h.d++;a.d++}
    else{a.pt+=3;a.w++;h.l++}
  });
  return Object.values(ts).sort((a,b)=>b.pt-a.pt||b.gd-a.gd);
}

// 获取全部比赛(按时间排序)
function 全部比赛(){
  const all=[];
  组.split('').forEach(l=>{
    G[l].m.forEach(m=>{all.push({...m,g:l});});
  });
  return all.sort((a,b)=>a.d.localeCompare(b.d)||a.t.localeCompare(b.t));
}

      <div style="font-size:12px;color:var(--text3)">${m.t} · ${m.v} · ${m.g}组</div>
      <div class="bet-sc">${p.sc} · 总进球 ${p.tg}</div>
      <div class="recs">${recs.map(r=>`<span class="r ${r.c}">${r.t}</span>`).join('')}</div>
      <div class="bet-prob">
        <div class="bet-prob-bar"><div class="b h" style="width:100%"></div><span class="bet-prob-lbl">${m.h} ${p.h}%</span></div>
        <div class="bet-prob-bar"><div class="b d" style="width:100%"></div><span class="bet-prob-lbl">平 ${p.d}%</span></div>
        <div class="bet-prob-bar"><div class="b a" style="width:100%"></div><span class="bet-prob-lbl">${m.a} ${p.a}%</span></div>
      </div>
      <div class="bet-odds">模拟赔率: ${(抽水*100/p.h).toFixed(2)} / ${(抽水*100/p.d).toFixed(2)} / ${(抽水*100/p.a).toFixed(2)}</div>
    </div>`;
    
    // Check next match - if different day or last match, close div
    const idx=all.indexOf(m);
    const next=all[idx+1];
    if(!next||next.d!==m.d)html+='</div>';
  });
  c.innerHTML=html;
}

function r淘(){
  const c=document.getElementById('brc');
  const gr={};
  组.split('').forEach(l=>{const st=积分(G[l]);
    if(st.length>=4&&st.some(t=>t.p>0)){gr[l]={w:st[0].n,r:st[1].n};}
    else{const s=[...G[l].t].sort((a,b)=>(T[b]?.att||0)-(T[a]?.att||0));gr[l]={w:s[0],r:s[1]};}});
  function dn(s){const g=s.match(/([A-L])组/);if(!g)return s;
    if(s.includes('第1'))return(旗[gr[g[1]]?.w]||'')+' '+gr[g[1]]?.w;
    if(s.includes('第2'))return(旗[gr[g[1]]?.r]||'')+' '+gr[g[1]]?.r;return s;}
  const r32=['A组第2 vs B组第2','E组第1 vs 第3','F组第1 vs C组第2','C组第1 vs F组第2',
    'I组第1 vs 第3','E组第2 vs I组第2','A组第1 vs 第3','L组第1 vs 第3',
    'D组第1 vs 第3','G组第1 vs 第3','K组第2 vs L组第2','H组第1 vs J组第2',
    'B组第1 vs 第3','J组第1 vs H组第2','K组第1 vs 第3','D组第2 vs G组第2'];
  let h='<div class="bracket-round"><div class="bracket-round-label">32强<br><small>6.28-7.3</small></div>';
  r32.forEach(m=>{const p=m.split(' vs ');h+=`<div class="bracket-game"><div class="bt">${dn(p[0])}</div><div class="bt lo">${dn(p[1])}</div></div>`;});
  h+='</div><div class="bracket-round"><div class="bracket-round-label">16强<br><small>7.4-7.7</small></div>';
  for(let i=0;i<8;i++)h+=`<div class="bracket-game"><div class="bt" style="padding:6px 0;text-align:center;color:var(--text3);font-size:10px">待定</div></div>`;
  h+='</div><div class="bracket-round"><div class="bracket-round-label">8强<br><small>7.9-7.11</small></div>';
  for(let i=0;i<4;i++)h+=`<div class="bracket-game"><div class="bt" style="padding:10px 0;text-align:center;color:var(--text3)">待定</div></div>`;
  h+='</div><div class="bracket-round"><div class="bracket-round-label">4强<br><small>7.14-7.15</small></div>';
  for(let i=0;i<2;i++)h+=`<div class="bracket-game"><div class="bt" style="padding:12px 0;text-align:center;color:var(--text3)">待定</div></div>`;
  h+='</div><div class="bracket-round"><div class="bracket-round-label">决赛<br><small>7.19</small></div>';
  h+=`<div class="bracket-game"><div class="bt" style="padding:14px 0;text-align:center;font-weight:700;font-size:13px;background:var(--gold);color:#000;border-radius:6px">🏆 冠军待定</div></div></div>`;
  c.innerHTML=h;
}

function st(tab){
  document.querySelectorAll('.tab-c').forEach(t=>t.classList.remove('act'));
  document.querySelectorAll('nav a').forEach(a=>a.classList.remove('act'));
  const el=document.getElementById('tab-'+tab);if(el)el.classList.add('act');
  document.querySelectorAll('nav a').forEach(a=>{
    const map={groups:'赛程',predictions:'预测',bets:'下注',bracket:'淘汰'};
    if(a.textContent.includes(map[tab]||''))a.classList.add('act');
  });
}
r();
